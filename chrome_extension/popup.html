<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChatGPT Project Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>ChatGPT Project Exporter</h1>
    </header>

    <main>
      <section class="input-group">
        <div class="details">
          <p><strong>Current tab:</strong> <span id="activeSource">ChatGPT page</span></p>
        </div>
      </section>

      <section class="input-group date-filter">
        <label for="dateFrom">Export Date Range:</label>
        <div class="date-row">
          <input id="dateFrom" type="date" aria-label="Date from" placeholder="From date">
          <input id="dateTo" type="date" aria-label="Date to" placeholder="To date">
        </div>
      </section>

      <section class="controls">
        <button id="startBtn" class="primary">Start Export</button>
        <button id="stopBtn" class="secondary" disabled>Stop</button>
      </section>

      <section class="status-panel">
        <div class="status-header">
          <span id="statusText">Idle</span>
          <div id="loader" class="loader hidden"></div>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="label">Discovered</span>
            <span id="statDiscovered" class="value">0</span>
          </div>
          <div class="stat-item">
            <span class="label">Exported</span>
            <span id="statExported" class="value">0</span>
          </div>
          <div class="stat-item">
            <span class="label">Failed</span>
            <span id="statFailed" class="value">0</span>
          </div>
        </div>
        <div class="details">
          <p><strong>Current:</strong> <span id="activeContext">-</span></p>
        </div>
      </section>

      <section class="actions">
        <button id="zipBtn">Download ZIP</button>
        <button id="clearBtn" class="danger">Clear Data</button>
        <button id="debugBtn" class="secondary">Debug</button>
      </section>

      <section class="history">
        <h3>Local Data</h3>
        <pre id="projects">No local export data</pre>
      </section>
    </main>

    <footer>
      <a href="https://github.com/hypsoma/ChatGptExporter" target="_blank" class="github-link">
        <svg height="14" width="14" viewBox="0 0 16 16" version="1.1" aria-hidden="true">
          <path fill="currentColor" fill-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
          </path>
        </svg>
        <span id="versionText"></span>
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
